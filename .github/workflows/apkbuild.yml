name: Build Android PRO APK (arm64-v8a)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-pro-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r23
          add-to-path: false
          local-cache: true

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Show tool versions (debug)
        run: |
          cmake --version || true
          java -version || true
          echo "NDK path: ${{ steps.setup-ndk.outputs.ndk-path }}"
      
      - name: Force ABI to arm64-v8a (temporary edit)
        shell: bash
        run: |
          set -e
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "Original abiFilters lines (for context):"
            grep -n "abiFilters" "$BUILD_GRADLE" || true

            # Replace common formats: both single and double quotes, with or without spaces.
            # This keeps only arm64-v8a in the abiFilters to produce an arm64-only APK.
            perl -0777 -pe "s/abiFilters\s*\(([^)]*)\)/abiFilters 'arm64-v8a'/g" -i "$BUILD_GRADLE" || true
            perl -0777 -pe "s/abiFilters\s+['\"][^'\"]+['\"][^\\n]*/abiFilters 'arm64-v8a'/g" -i "$BUILD_GRADLE" || true

            echo "Updated abiFilters lines:"
            grep -n "abiFilters" "$BUILD_GRADLE" || true
          else
            echo "Warning: $BUILD_GRADLE not found, skipping edit"
          fi

      - name: Build (Gradle assembleRelease)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -e
          cd android
          chmod +x gradlew
          # If your build.gradle already sets DBUILD_PRO=On, Gradle/CMake will pick it up.
          ./gradlew clean assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release.apk out/tic80-android-pro-arm64.apk
          ls -l out || true

      - name: Upload PRO APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: tic80-android-pro-arm64
          path: out/tic80-android-pro-arm64.apk
